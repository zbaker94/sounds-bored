name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  # ─── Phase 1: Version bump + draft release ────────────────────────────────
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      release_notes_full: ${{ steps.capture-notes.outputs.release_notes_full }}
      release_notes_summary: ${{ steps.capture-notes.outputs.release_notes_summary }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Extract release notes from master
        run: |
          git fetch origin master
          git show origin/master:CHANGELOG.md > CHANGELOG.md
          node scripts/changelog-release-notes.cjs
          git restore CHANGELOG.md
        env:
          VERSION: ${{ steps.version.outputs.version }}

      - name: Capture release notes as job outputs
        id: capture-notes
        run: |
          {
            echo "release_notes_full<<NOTES_DELIM"
            echo "$RELEASE_NOTES_FULL"
            echo "NOTES_DELIM"
          } >> $GITHUB_OUTPUT
          {
            echo "release_notes_summary<<NOTES_DELIM"
            echo "$RELEASE_NOTES_SUMMARY"
            echo "NOTES_DELIM"
          } >> $GITHUB_OUTPUT

      - name: Bump package.json
        run: node -e "const fs=require('fs'),p=JSON.parse(fs.readFileSync('package.json','utf8'));p.version=process.env.VERSION;fs.writeFileSync('package.json',JSON.stringify(p,null,2)+'\n')"
        env:
          VERSION: ${{ steps.version.outputs.version }}

      - name: Bump src-tauri/tauri.conf.json
        run: node -e "const fs=require('fs'),p=JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json','utf8'));p.version=process.env.VERSION;fs.writeFileSync('src-tauri/tauri.conf.json',JSON.stringify(p,null,2)+'\n')"
        env:
          VERSION: ${{ steps.version.outputs.version }}

      - name: Bump src-tauri/Cargo.toml
        run: sed -i "s/^version = \".*\"/version = \"$VERSION\"/" src-tauri/Cargo.toml
        env:
          VERSION: ${{ steps.version.outputs.version }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Update Cargo.lock
        run: cd src-tauri && cargo generate-lockfile

      - name: Commit version bump to master
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json src-tauri/tauri.conf.json src-tauri/Cargo.toml src-tauri/Cargo.lock
          git commit -m "chore: bump version to $VERSION [skip ci]"
          git pull --rebase origin master
          git push origin HEAD:master
        env:
          VERSION: ${{ steps.version.outputs.version }}

      - name: Create draft release
        run: |
          gh release create "${{ github.ref_name }}" \
            --draft \
            --title "SoundsBored ${{ steps.version.outputs.version }}" \
            --notes "${{ steps.capture-notes.outputs.release_notes_full }}" \
            --repo zbaker94/sounds-bored
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─── Phase 2: Platform builds (parallel) ─────────────────────────────────
  build:
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
          - platform: macos-latest
            target: aarch64-apple-darwin
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: master

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: ${{ matrix.target }}

      - name: Download sidecar binaries
        shell: bash
        run: bash scripts/download-yt-dlp.sh

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install JS dependencies
        run: npm ci

      - name: Build and upload release artifacts
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        with:
          args: --target ${{ matrix.target }}
          tagName: ${{ github.ref_name }}
          releaseName: "SoundsBored ${{ needs.prepare.outputs.version }}"
          releaseBody: ${{ needs.prepare.outputs.release_notes_full }}
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: true
          updaterJsonPreferNsis: true

  # ─── Phase 3: Publish release + push to releases repo ────────────────────
  finalize:
    needs: [prepare, build]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Publish draft release
        run: gh release edit "${{ github.ref_name }}" --draft=false --repo zbaker94/sounds-bored
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download all release artifacts
        run: |
          gh release download "${{ github.ref_name }}" \
            --dir release-artifacts \
            --repo zbaker94/sounds-bored \
            --pattern "*.exe" \
            --pattern "*.msi" \
            --pattern "*.dmg" \
            --pattern "*.app.tar.gz" \
            --pattern "*.AppImage" \
            --pattern "*.deb" \
            --pattern "*.sig" \
            --pattern "*.json"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Rewrite latest.json URLs to point to releases repo
        run: |
          node -e "
            const fs = require('fs');
            const json = JSON.parse(fs.readFileSync('release-artifacts/latest.json', 'utf8'));
            for (const platform of Object.values(json.platforms)) {
              const filename = platform.url.split('/').pop();
              platform.url = 'https://github.com/zbaker94/sounds-bored-releases/releases/download/' + process.env.TAG + '/' + filename;
            }
            fs.writeFileSync('release-artifacts/latest.json', JSON.stringify(json, null, 2) + '\n');
          "
        env:
          TAG: ${{ github.ref_name }}

      - name: Write release notes summary
        run: printf '%s' "${{ needs.prepare.outputs.release_notes_summary }}" > release-notes.md

      - name: Publish artifacts to public releases repo
        run: |
          GH_TOKEN="$RELEASES_TOKEN" gh release create "${{ github.ref_name }}" \
            release-artifacts/* \
            --repo zbaker94/sounds-bored-releases \
            --title "SoundsBored ${{ needs.prepare.outputs.version }}" \
            --notes-file release-notes.md
        env:
          RELEASES_TOKEN: ${{ secrets.RELEASES_REPO_TOKEN }}

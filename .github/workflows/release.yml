name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - name: Extract release notes and stamp CHANGELOG.md
        shell: bash
        run: |
          node -e "
            const fs = require('fs');
            const version = process.env.VERSION;
            const changelogPath = 'CHANGELOG.md';

            let changelog = (fs.existsSync(changelogPath)
              ? fs.readFileSync(changelogPath, 'utf8')
              : '# Changelog\n').replace(/\r\n/g, '\n');

            // Prefer the version heading stamped by the pre-push hook;
            // fall back to Current Changes if the hook didn't run.
            const versionMarker = '## v' + version;
            const currentMarker = '## Current Changes';
            let sectionStart = changelog.indexOf(versionMarker);
            let needsRename = false;

            if (sectionStart === -1) {
              sectionStart = changelog.indexOf(currentMarker);
              needsRename = true;
            }

            let fullNotes = 'No changelog entries.';
            let summary = '';

            if (sectionStart !== -1) {
              const afterMarker = changelog.indexOf('\n', sectionStart) + 1;
              const rest = changelog.slice(afterMarker);
              const nextSection = rest.search(/^## /m);
              fullNotes = (nextSection === -1 ? rest : rest.slice(0, nextSection)).trim() || 'No changelog entries.';

              if (needsRename) {
                changelog = changelog.replace(currentMarker, versionMarker);
                fs.writeFileSync(changelogPath, changelog);
              }

              // Summary = first paragraph before the bullet list (added by pre-push hook).
              // Falls back to the full notes if no separate summary paragraph exists.
              const bulletIndex = fullNotes.search(/^- /m);
              summary = bulletIndex > 0
                ? fullNotes.slice(0, bulletIndex).trim()
                : fullNotes;
            }

            const appendEnv = (key, val) => {
              const d = key + '_DELIM_' + Date.now();
              fs.appendFileSync(process.env.GITHUB_ENV, key + '<<' + d + '\n' + val + '\n' + d + '\n');
            };
            appendEnv('RELEASE_NOTES_FULL', fullNotes);
            appendEnv('RELEASE_NOTES_SUMMARY', summary || fullNotes);
          "

      - name: Bump package.json
        shell: bash
        run: node -e "const fs=require('fs'),p=JSON.parse(fs.readFileSync('package.json','utf8'));p.version=process.env.VERSION;fs.writeFileSync('package.json',JSON.stringify(p,null,2)+'\n')"

      - name: Bump src-tauri/tauri.conf.json
        shell: bash
        run: node -e "const fs=require('fs'),p=JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json','utf8'));p.version=process.env.VERSION;fs.writeFileSync('src-tauri/tauri.conf.json',JSON.stringify(p,null,2)+'\n')"

      - name: Bump src-tauri/Cargo.toml
        shell: bash
        run: sed -i "s/^version = \".*\"/version = \"$VERSION\"/" src-tauri/Cargo.toml

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Update Cargo.lock
        shell: bash
        run: cd src-tauri && cargo generate-lockfile

      - name: Commit version bump to master
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json src-tauri/tauri.conf.json src-tauri/Cargo.toml src-tauri/Cargo.lock CHANGELOG.md
          git commit -m "chore: bump version to $VERSION [skip ci]"
          git pull --rebase origin master
          git push origin HEAD:master

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Download sidecar binaries
        shell: bash
        run: bash scripts/download-yt-dlp.sh

      - name: Install JS dependencies
        run: npm ci

      - name: Build and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "SoundsBored ${{ env.VERSION }}"
          releaseBody: ${{ env.RELEASE_NOTES_FULL }}
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
          updaterJsonPreferNsis: true

      - name: Publish artifacts to public releases repo
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASES_TOKEN: ${{ secrets.RELEASES_REPO_TOKEN }}
          TAG: ${{ github.ref_name }}
          VERSION: ${{ env.VERSION }}
        run: |
          gh release download "$TAG" \
            --dir release-artifacts \
            --repo zbaker94/sounds-bored \
            --pattern "*.exe" \
            --pattern "*.msi" \
            --pattern "*.sig" \
            --pattern "*.json"

          node -e "
            const fs = require('fs');
            const json = JSON.parse(fs.readFileSync('release-artifacts/latest.json', 'utf8'));
            for (const platform of Object.values(json.platforms)) {
              const filename = platform.url.split('/').pop();
              platform.url = 'https://github.com/zbaker94/sounds-bored-releases/releases/download/' + process.env.TAG + '/' + filename;
            }
            fs.writeFileSync('release-artifacts/latest.json', JSON.stringify(json, null, 2) + '\n');
          "

          printf '%s' "${{ env.RELEASE_NOTES_SUMMARY }}" > release-notes.md

          GH_TOKEN="$RELEASES_TOKEN" gh release create "$TAG" \
            release-artifacts/*.exe \
            release-artifacts/*.msi \
            release-artifacts/*.sig \
            release-artifacts/*.json \
            --repo zbaker94/sounds-bored-releases \
            --title "SoundsBored $VERSION" \
            --notes-file release-notes.md

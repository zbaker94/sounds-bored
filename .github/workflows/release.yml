name: Release Trigger

on:
  push:
    tags:
      - "v*"

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch release to public releases repo
        run: |
          curl -sSf -X POST \
            -H "Authorization: Bearer ${{ secrets.RELEASES_REPO_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/zbaker94/sounds-bored-releases/dispatches \
            -d '{
              "event_type": "release",
              "client_payload": {
                "tag": "${{ github.ref_name }}",
                "sha": "${{ github.sha }}"
              }
            }'
